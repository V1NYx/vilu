<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VILU{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <a href="{{ url_for('principal') }}" class="navbar-brand">VILU</a>

  <div class="navbar-links">
    {% if session.user_nome %}
      <a href="{{ url_for('principal') }}">Comunidade</a>
      <a href="{{ url_for('home') }}">Buscar</a>
      <a href="{{ url_for('perfil') }}">Meu Perfil</a>
      <span class="navbar-divider">|</span>
      <span class="navbar-user">{{ session.user_nome }}</span>
      <a href="{{ url_for('auth.logout') }}" class="nav-sair">Sair</a>
    {% else %}
      <a href="{{ url_for('auth.login') }}">Entrar</a>
      <a href="{{ url_for('auth.cadastro') }}">Criar conta</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
