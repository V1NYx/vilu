<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>VILU — Criar conta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">VILU</div>
    <div class="auth-subtitle">Crie sua conta e comece a avaliar</div>

    {% if erro %}
      <div class="alert alert-error">{{ erro }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label for="senha">Senha <span style="color:var(--text-muted);font-size:0.8rem">(mínimo 6 caracteres)</span></label>
        <input type="password" id="senha" name="senha" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Criar conta</button>
    </form>

    <div class="auth-footer">
      Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
    </div>

  </div>
</div>
</body>
</html>
